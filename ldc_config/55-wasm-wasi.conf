"^wasm(32|64)-.*wasi":
{
    switches ~= [
        "-defaultlib=",
        "-L-z",
        "-Lstack-size=1048576",
        "--static",
        "-L--stack-first",
        "-L--export-dynamic",
        "-L--allow-multiple-definition"
    ];
    lib-dirs = [
        "%%ldcbinarypath%%/../../wasi-sdk/share/wasi-sysroot/lib/wasm32-wasi/",
        "%%ldcbinarypath%%/../../wasi-sdk/share/wasi-sysroot/lib/wasm32-wasi/eh/",
        "%%ldcbinarypath%%/../../wasi-sdk/lib/clang/22/lib/wasm32-unknown-wasi/"
    ];
    post-switches = [
        "-I=%%ldcbinarypath%%/../import-wasm/",
        "--gcc=wasm32-wasi-clang",
        "--Xcc=--sysroot=%%ldcbinarypath%%/../../wasi-sdk/share/wasi-sysroot",
        "--linker=wasm-ld",
        "-L-lc",
        "-L-lm",
        "-L-lc++",
        "-L-lc++abi",
        "-L-lunwind",
        "-L-lclang_rt.builtins"
    ];
};
